<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 555" font-family="'Segoe UI', 'Liberation Sans', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="555" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" fill="#0f172a" font-size="17" font-weight="700">Command Generation Pipeline</text>
  <text x="410" y="54" text-anchor="middle" fill="#4b5563" font-size="11">oxo-call run / dry-run</text>
  <line x1="60" y1="64" x2="760" y2="64" stroke="#cbd5e1" stroke-width="1"/>

  <!-- STEP 1: User Input -->
  <rect x="60" y="82" width="700" height="58" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="82" width="8" height="58" rx="4" fill="#2563eb"/>
  <text x="92" y="105" fill="#1d4ed8" font-size="13" font-weight="700">① User Input</text>
  <text x="92" y="125" fill="#1e3a5f" font-size="11" font-family="monospace">oxo-call run samtools "sort input.bam by coordinate using 4 threads"</text>

  <!-- Arrow -->
  <line x1="410" y1="140" x2="410" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 2: License Gate -->
  <rect x="60" y="157" width="700" height="52" rx="9" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="157" width="8" height="52" rx="4" fill="#7c3aed"/>
  <text x="92" y="179" fill="#6d28d9" font-size="13" font-weight="700">② License Verification</text>
  <text x="92" y="197" fill="#374151" font-size="11">Ed25519 signature check  →  Valid academic / commercial license required</text>
  <!-- Lock icon sketch -->
  <rect x="730" y="166" width="18" height="14" rx="3" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M735 166 Q735 160 739 160 Q743 160 743 166" fill="none" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Arrow -->
  <line x1="410" y1="209" x2="410" y2="224" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 3: Documentation Layer -->
  <rect x="60" y="226" width="700" height="78" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="226" width="8" height="78" rx="4" fill="#16a34a"/>
  <text x="92" y="249" fill="#166534" font-size="13" font-weight="700">③ Documentation Fetch</text>
  <!-- Sub items -->
  <rect x="92" y="258" width="148" height="20" rx="4" fill="#d1fae5" stroke="#15803d" stroke-width="1"/>
  <text x="166" y="272" text-anchor="middle" fill="#374151" font-size="10">Cached --help output</text>
  <rect x="248" y="258" width="148" height="20" rx="4" fill="#d1fae5" stroke="#15803d" stroke-width="1"/>
  <text x="322" y="272" text-anchor="middle" fill="#374151" font-size="10">Live --help (if stale)</text>
  <rect x="404" y="258" width="148" height="20" rx="4" fill="#d1fae5" stroke="#15803d" stroke-width="1"/>
  <text x="478" y="272" text-anchor="middle" fill="#374151" font-size="10">Local doc files</text>
  <rect x="560" y="258" width="148" height="20" rx="4" fill="#d1fae5" stroke="#15803d" stroke-width="1"/>
  <text x="634" y="272" text-anchor="middle" fill="#374151" font-size="10">Remote URLs</text>
  <text x="92" y="295" fill="#4b5563" font-size="10">→  Merged, deduplicated, validated (80–16 000 chars), cached for next run</text>

  <!-- Arrow -->
  <line x1="410" y1="304" x2="410" y2="319" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 4: Skill System -->
  <rect x="60" y="321" width="700" height="80" rx="9" fill="#fffbeb" stroke="#b45309" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="321" width="8" height="80" rx="4" fill="#d97706"/>
  <text x="92" y="344" fill="#92400e" font-size="13" font-weight="700">④ Skill Loading</text>
  <rect x="92" y="353" width="96" height="20" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
  <text x="140" y="367" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">user</text>
  <text x="196" y="362" fill="#4b5563" font-size="10">›</text>
  <rect x="204" y="353" width="96" height="20" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
  <text x="252" y="367" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">community</text>
  <text x="308" y="362" fill="#4b5563" font-size="10">›</text>
  <rect x="316" y="353" width="72" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="352" y="367" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">MCP</text>
  <text x="396" y="362" fill="#4b5563" font-size="10">›</text>
  <rect x="404" y="353" width="128" height="20" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
  <text x="468" y="367" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">built-in (150+ tools)</text>
  <text x="92" y="390" fill="#4b5563" font-size="10">Concepts · Pitfalls · Worked examples &#x2192; injected into LLM prompt</text>

  <!-- Arrow -->
  <line x1="410" y1="401" x2="410" y2="416" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 5: LLM -->
  <rect x="60" y="418" width="700" height="58" rx="9" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="418" width="8" height="58" rx="4" fill="#7c3aed"/>
  <text x="92" y="441" fill="#6d28d9" font-size="13" font-weight="700">⑤ LLM API Call</text>
  <rect x="92" y="450" width="90" height="18" rx="4" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="137" y="463" text-anchor="middle" fill="#6d28d9" font-size="10">GitHub Copilot</text>
  <rect x="190" y="450" width="90" height="18" rx="4" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="235" y="463" text-anchor="middle" fill="#6d28d9" font-size="10">OpenAI</text>
  <rect x="288" y="450" width="90" height="18" rx="4" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="333" y="463" text-anchor="middle" fill="#6d28d9" font-size="10">Anthropic</text>
  <rect x="386" y="450" width="90" height="18" rx="4" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="431" y="463" text-anchor="middle" fill="#6d28d9" font-size="10">Ollama (local)</text>
  <text x="560" y="463" fill="#4b5563" font-size="10">ARGS: + EXPLANATION: format</text>

  <!-- Arrow -->
  <line x1="410" y1="476" x2="410" y2="491" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- STEP 6: Output -->
  <rect x="60" y="493" width="340" height="44" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="493" width="8" height="44" rx="4" fill="#16a34a"/>
  <text x="92" y="512" fill="#166534" font-size="12" font-weight="700">⑥a Execute (run)</text>
  <text x="92" y="528" fill="#374151" font-size="11" font-family="monospace">samtools sort -@ 4 -o sorted.bam input.bam</text>

  <rect x="420" y="493" width="340" height="44" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="420" y="493" width="8" height="44" rx="4" fill="#2563eb"/>
  <text x="452" y="512" fill="#1d4ed8" font-size="12" font-weight="700">⑥b Preview (dry-run)</text>
  <text x="452" y="528" fill="#374151" font-size="11">Shows command + explanation, no execution</text>
</svg>
