[meta]
name = "minimap2_index"
category = "utilities"
description = "Advanced minimap2 index building and specialized alignment for pangenomics and long-read RNA-seq"
tags = ["alignment", "long-read", "nanopore", "pacbio", "rna-seq", "pangenome", "index"]
author = "oxo-call built-in"
source_url = "https://github.com/lh3/minimap2"

[context]
concepts = [
    "minimap2 -d builds a reusable index file (.mmi) for repeated alignment to the same reference.",
    "Use 'minimap2 -d ref.mmi ref.fa' to build index; then 'minimap2 -a ref.mmi reads.fa' to align.",
    "For long-read RNA-seq: use -ax splice (for pre-built genome) for spliced alignment.",
    "Splice-aware alignment: minimap2 -ax splice --junc-bed junctions.bed ref.fa reads.fa for better junction calling.",
    "For assembly-to-assembly alignment: minimap2 -x asm5 (for similar genomes) or -x asm20 (5-20% divergence).",
    "For variation graph (VG) alignment: minimap2 outputs PAF for subsequent pangenome analysis.",
    "minimap2 -c outputs PAF format (good for assembly overlap/comparison); -a outputs SAM.",
    "Use --MD flag to add MD string to SAM (required by Medaka/Sniffles for correct variant calling).",
]

pitfalls = [
    "The built .mmi index is specific to the preset used — you cannot reuse a map-ont index for map-pb.",
    "Splice-aware alignment (-ax splice) requires additional flags for optimal results with RNA-seq.",
    "The --MD flag is often forgotten but required by downstream tools like Medaka and Sniffles.",
    "minimap2 secondary alignments (-N 5 by default) may overwhelm small datasets — use --secondary=no to disable.",
    "For assembly comparison, asm5 assumes <5% divergence — use asm20 for more divergent sequences.",
]

[[examples]]
task = "build a reusable minimap2 index for ONT alignment"
args = "-d reference_ont.mmi -x map-ont reference.fa"
explanation = "-d creates .mmi index; -x preset must match the intended alignment use"

[[examples]]
task = "align long-read RNA-seq reads with splice-aware mode"
args = "-ax splice --junc-bed known_junctions.bed -o rna_aligned.bam reference.fa rna_reads.fastq.gz"
explanation = "-ax splice for spliced alignment; --junc-bed provides known splice junctions for improved accuracy"

[[examples]]
task = "compare two genome assemblies with minimap2"
args = "-ax asm5 -o asm_comparison.sam assembly1.fa assembly2.fa"
explanation = "-x asm5 for similar assemblies (<5% divergence); -c for PAF output (better for dotplots)"

[[examples]]
task = "compute all-vs-all overlaps for assembly (e.g., for Miniasm)"
args = "-x ava-ont -t 16 reads.fastq.gz reads.fastq.gz | gzip > overlaps.paf.gz"
explanation = "-x ava-ont all-vs-all for ONT reads; -x ava-pb for PacBio; used for de novo assembly"
