  <rect x="204" y="102" width="12" height="729" rx="1" fill="#3498DB"/>
  <!-- Claude: 99.57% → 830 - 708.4 = 121.7 -->
  <rect x="218" y="122" width="12" height="708" rx="1" fill="#E8833A"/>
  <!-- Mini: 99.40% → 830 - 681 = 149 -->
  <rect x="232" y="149" width="12" height="681" rx="1" fill="#50B86C"/>
  <text x="223" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 223, 850)">metagenomics (10)</text>

