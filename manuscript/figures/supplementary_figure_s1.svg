  <rect x="160" y="97" width="12" height="733" rx="1" fill="#3498DB"/>
  <!-- Claude: 99.82% → 830 - 747.1 = 82.9 -->
  <rect x="174" y="83" width="12" height="747" rx="1" fill="#E8833A"/>
  <!-- Mini: 99.36% → 830 - 675.8 = 154.2 -->
  <rect x="188" y="154" width="12" height="676" rx="1" fill="#50B86C"/>
  <text x="179" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 179, 850)">assembly (11)</text>

