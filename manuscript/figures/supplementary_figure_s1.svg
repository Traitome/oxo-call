  <rect x="438" y="70" width="12" height="760" rx="1" fill="#E8833A"/>
  <rect x="452" y="72" width="12" height="758" rx="1" fill="#50B86C"/>
  <text x="443" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 443, 850)">hpc (6)</text>

  <!-- 10. annotation (6 tools) -->
  <rect x="468" y="80" width="12" height="750" rx="1" fill="#3498DB"/>
  <rect x="482" y="90" width="12" height="740" rx="1" fill="#E8833A"/>
  <rect x="496" y="85" width="12" height="745" rx="1" fill="#50B86C"/>
  <text x="487" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 487, 850)">annotation (6)</text>

