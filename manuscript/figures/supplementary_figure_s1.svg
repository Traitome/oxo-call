  <rect x="512" y="72" width="12" height="758" rx="1" fill="#3498DB"/>
  <rect x="526" y="78" width="12" height="752" rx="1" fill="#E8833A"/>
  <rect x="540" y="95" width="12" height="735" rx="1" fill="#50B86C"/>
  <text x="531" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 531, 850)">single-cell (5)</text>

  <!-- 12. package-management (5 tools) -->
  <rect x="556" y="60" width="12" height="770" rx="1" fill="#3498DB"/>
  <rect x="570" y="62" width="12" height="768" rx="1" fill="#E8833A"/>
  <rect x="584" y="58" width="12" height="772" rx="1" fill="#50B86C"/>
  <text x="575" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 575, 850)">pkg-management (5)</text>

  <!-- 13. population-genomics (4 tools) -->
  <rect x="600" y="55" width="12" height="775" rx="1" fill="#3498DB"/>
