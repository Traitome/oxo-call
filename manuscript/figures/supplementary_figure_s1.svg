  <!-- GPT-4o: 99.78% → 830 - 740.9 = 89.1 -->
  <rect x="248" y="89" width="12" height="741" rx="1" fill="#3498DB"/>
  <!-- Claude: 99.56% → 830 - 706.8 = 123.2 -->
  <rect x="262" y="123" width="12" height="707" rx="1" fill="#E8833A"/>
  <!-- Mini: 99.44% → 830 - 688.2 = 141.8 -->
  <rect x="276" y="142" width="12" height="688" rx="1" fill="#50B86C"/>
  <text x="267" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 267, 850)">alignment (9)</text>

