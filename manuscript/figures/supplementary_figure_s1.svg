<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 900" font-family="Helvetica, Arial, sans-serif">
  <text x="480" y="22" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Supplementary Figure S1. Per-category exact-match rates under enhanced mode (top 20 of 44 categories)</text>
  <text x="480" y="38" font-size="9" fill="#666" text-anchor="middle">Grouped bars: GPT-4o (blue), Claude 3.5 Sonnet (orange), GPT-4o-mini (green). Categories ordered by number of tools. n = 300 trials per tool-model pair.</text>

  <!-- Y axis label -->
  <text x="18" y="450" font-size="10" fill="#333" text-anchor="middle" transform="rotate(-90, 18, 450)">Exact-match rate (%)</text>

  <!-- Chart area -->
  <!-- Y axis -->
  <line x1="60" y1="55" x2="60" y2="830" stroke="#333" stroke-width="1"/>
  <!-- X axis -->
  <line x1="60" y1="830" x2="940" y2="830" stroke="#333" stroke-width="1"/>

  <!-- Y axis: 95-100% range (zoomed in) -->
  <line x1="56" y1="830" x2="60" y2="830" stroke="#333" stroke-width="1"/>
  <text x="53" y="834" font-size="8" fill="#333" text-anchor="end">95.0</text>
  <line x1="56" y1="675" x2="60" y2="675" stroke="#333" stroke-width="1"/>
  <text x="53" y="679" font-size="8" fill="#333" text-anchor="end">96.0</text>
  <line x1="56" y1="520" x2="60" y2="520" stroke="#333" stroke-width="1"/>
  <text x="53" y="524" font-size="8" fill="#333" text-anchor="end">97.0</text>
  <line x1="56" y1="365" x2="60" y2="365" stroke="#333" stroke-width="1"/>
  <text x="53" y="369" font-size="8" fill="#333" text-anchor="end">98.0</text>
  <line x1="56" y1="210" x2="60" y2="210" stroke="#333" stroke-width="1"/>
  <text x="53" y="214" font-size="8" fill="#333" text-anchor="end">99.0</text>
  <line x1="56" y1="55" x2="60" y2="55" stroke="#333" stroke-width="1"/>
  <text x="53" y="59" font-size="8" fill="#333" text-anchor="end">100.0</text>

  <!-- Grid lines -->
  <line x1="60" y1="55" x2="940" y2="55" stroke="#F0F0F0" stroke-width="0.5"/>
  <line x1="60" y1="210" x2="940" y2="210" stroke="#F0F0F0" stroke-width="0.5"/>
  <line x1="60" y1="365" x2="940" y2="365" stroke="#F0F0F0" stroke-width="0.5"/>
  <line x1="60" y1="520" x2="940" y2="520" stroke="#F0F0F0" stroke-width="0.5"/>
  <line x1="60" y1="675" x2="940" y2="675" stroke="#F0F0F0" stroke-width="0.5"/>

  <!-- Scale: 95% → y=830, 100% → y=55; 1% = 155px -->
  <!-- Each category group: 44px wide, 3 bars of 12px + 4px spacing -->

  <!-- 1. variant-calling (16 tools) -->
  <!-- GPT-4o: 99.62% → y = 830 - (99.62-95)*155 = 830 - 716.1 = 113.9 -->
  <rect x="72" y="114" width="12" height="716" rx="1" fill="#3498DB"/>
  <!-- Claude: 99.44% → 830 - 688.2 = 141.8 -->
  <rect x="86" y="142" width="12" height="688" rx="1" fill="#E8833A"/>
  <!-- Mini: 99.62% → same as 4o -->
  <rect x="100" y="114" width="12" height="716" rx="1" fill="#50B86C"/>
  <text x="91" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 91, 850)">variant-calling (16)</text>

  <!-- 2. qc (12 tools) -->
  <!-- GPT-4o: 99.42% → 830 - 685.1 = 144.9 -->
  <rect x="116" y="145" width="12" height="685" rx="1" fill="#3498DB"/>
  <!-- Claude: 99.50% → 830 - 697.5 = 132.5 -->
  <rect x="130" y="133" width="12" height="698" rx="1" fill="#E8833A"/>
  <!-- Mini: 99.92% → 830 - 762.6 = 67.4 -->
  <rect x="144" y="67" width="12" height="763" rx="1" fill="#50B86C"/>
  <text x="135" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 135, 850)">qc (12)</text>

