  <rect x="790" y="55" width="12" height="775" rx="1" fill="#E8833A"/>
  <rect x="804" y="55" width="12" height="775" rx="1" fill="#50B86C"/>
  <text x="795" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 795, 850)">text-processing (3)</text>

  <!-- 18. seq-utilities (3 tools) -->
  <rect x="820" y="55" width="12" height="775" rx="1" fill="#3498DB"/>
  <rect x="834" y="60" width="12" height="770" rx="1" fill="#E8833A"/>
  <rect x="848" y="55" width="12" height="775" rx="1" fill="#50B86C"/>
  <text x="839" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 839, 850)">seq-utilities (3)</text>

  <!-- 19. filesystem (3 tools) -->
  <rect x="864" y="55" width="12" height="775" rx="1" fill="#3498DB"/>
  <rect x="878" y="55" width="12" height="775" rx="1" fill="#E8833A"/>
  <rect x="892" y="55" width="12" height="775" rx="1" fill="#50B86C"/>
  <text x="883" y="850" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-35, 883, 850)">filesystem (3)</text>

  <!-- Break indicator: zoomed axis notice -->
  <rect x="60" y="823" width="880" height="7" fill="none" stroke="#CCC" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="480" y="875" font-size="8" fill="#666" text-anchor="middle" font-style="italic">Note: Y-axis starts at 95% to show variation. All categories achieve ≥99.3% exact match. 13 categories (not shown) achieve 100% across all models.</text>

  <!-- Legend -->
  <rect x="700" y="55" width="0" height="0"/>
  <rect x="680" y="25" width="10" height="10" rx="2" fill="#3498DB"/>
  <text x="695" y="34" font-size="8.5" fill="#333">GPT-4o</text>
  <rect x="750" y="25" width="10" height="10" rx="2" fill="#E8833A"/>
