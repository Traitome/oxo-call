<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">

  <text x="15" y="22" font-size="14" font-weight="bold" fill="#333">Supplementary Figure S3.</text>
  <text x="225" y="22" font-size="13" fill="#555">Benchmark simulation scenarios and synthetic data overview</text>

  <!-- Scenario table -->
  <rect x="50" y="45" width="800" height="280" rx="6" fill="#fff" stroke="#bdbdbd" stroke-width="1"/>

  <!-- Header -->
  <rect x="50" y="45" width="800" height="30" rx="6" fill="#eceff1" stroke="#bdbdbd" stroke-width="1"/>
  <text x="70" y="65" font-size="10" font-weight="bold" fill="#37474f">Scenario ID</text>
  <text x="230" y="65" font-size="10" font-weight="bold" fill="#37474f">Assay</text>
  <text x="360" y="65" font-size="10" font-weight="bold" fill="#37474f">Samples</text>
  <text x="430" y="65" font-size="10" font-weight="bold" fill="#37474f">Read len</text>
  <text x="510" y="65" font-size="10" font-weight="bold" fill="#37474f">Reads/sample</text>
  <text x="620" y="65" font-size="10" font-weight="bold" fill="#37474f">Error rate</text>
  <text x="720" y="65" font-size="10" font-weight="bold" fill="#37474f">Total reads</text>

  <!-- Data rows -->
  <!-- rnaseq_3s -->
  <rect x="52" y="77" width="796" height="22" fill="#f5f5f5"/>
  <text x="70" y="92" font-size="9.5" fill="#333" font-family="Courier">rnaseq_3s_pe150</text>
  <text x="230" y="92" font-size="9.5" fill="#555">RNA-seq</text>
  <text x="370" y="92" font-size="9.5" fill="#555">3</text>
  <text x="440" y="92" font-size="9.5" fill="#555">150 bp</text>
  <text x="530" y="92" font-size="9.5" fill="#555">5,000</text>
  <text x="630" y="92" font-size="9.5" fill="#555">0.010</text>
  <text x="730" y="92" font-size="9.5" fill="#555">15,000</text>

  <!-- rnaseq_10s -->
  <text x="70" y="114" font-size="9.5" fill="#333" font-family="Courier">rnaseq_10s_pe150</text>
  <text x="230" y="114" font-size="9.5" fill="#555">RNA-seq</text>
  <text x="370" y="114" font-size="9.5" fill="#555">10</text>
  <text x="440" y="114" font-size="9.5" fill="#555">150 bp</text>
  <text x="530" y="114" font-size="9.5" fill="#555">5,000</text>
  <text x="630" y="114" font-size="9.5" fill="#555">0.010</text>
  <text x="730" y="114" font-size="9.5" fill="#555">50,000</text>

  <!-- wgs_2s -->
  <rect x="52" y="121" width="796" height="22" fill="#f5f5f5"/>
  <text x="70" y="136" font-size="9.5" fill="#333" font-family="Courier">wgs_2s_pe150</text>
  <text x="230" y="136" font-size="9.5" fill="#555">WGS</text>
  <text x="370" y="136" font-size="9.5" fill="#555">2</text>
  <text x="440" y="136" font-size="9.5" fill="#555">150 bp</text>
  <text x="530" y="136" font-size="9.5" fill="#555">50,000</text>
  <text x="630" y="136" font-size="9.5" fill="#555">0.005</text>
  <text x="730" y="136" font-size="9.5" fill="#555">100,000</text>

  <!-- atacseq_3s -->
  <text x="70" y="158" font-size="9.5" fill="#333" font-family="Courier">atacseq_3s_pe50</text>
  <text x="230" y="158" font-size="9.5" fill="#555">ATAC-seq</text>
  <text x="370" y="158" font-size="9.5" fill="#555">3</text>
  <text x="440" y="158" font-size="9.5" fill="#555">50 bp</text>
  <text x="530" y="158" font-size="9.5" fill="#555">20,000</text>
  <text x="630" y="158" font-size="9.5" fill="#555">0.010</text>
  <text x="730" y="158" font-size="9.5" fill="#555">60,000</text>

  <!-- metagenomics_4s -->
  <rect x="52" y="165" width="796" height="22" fill="#f5f5f5"/>
  <text x="70" y="180" font-size="9.5" fill="#333" font-family="Courier">metagenomics_4s_pe150</text>
  <text x="230" y="180" font-size="9.5" fill="#555">Metagenomics</text>
  <text x="370" y="180" font-size="9.5" fill="#555">4</text>
  <text x="440" y="180" font-size="9.5" fill="#555">150 bp</text>
  <text x="530" y="180" font-size="9.5" fill="#555">10,000</text>
  <text x="630" y="180" font-size="9.5" fill="#555">0.015</text>
  <text x="730" y="180" font-size="9.5" fill="#555">40,000</text>

  <!-- chipseq_3s -->
  <text x="70" y="202" font-size="9.5" fill="#333" font-family="Courier">chipseq_3s_pe75</text>
  <text x="230" y="202" font-size="9.5" fill="#555">ChIP-seq</text>
  <text x="370" y="202" font-size="9.5" fill="#555">3</text>
  <text x="440" y="202" font-size="9.5" fill="#555">75 bp</text>
  <text x="530" y="202" font-size="9.5" fill="#555">15,000</text>
  <text x="630" y="202" font-size="9.5" fill="#555">0.010</text>
  <text x="730" y="202" font-size="9.5" fill="#555">45,000</text>

  <!-- methylseq_2s -->
  <rect x="52" y="209" width="796" height="22" fill="#f5f5f5"/>
  <text x="70" y="224" font-size="9.5" fill="#333" font-family="Courier">methylseq_2s_pe150</text>
  <text x="230" y="224" font-size="9.5" fill="#555">Methyl-seq</text>
  <text x="370" y="224" font-size="9.5" fill="#555">2</text>
  <text x="440" y="224" font-size="9.5" fill="#555">150 bp</text>
  <text x="530" y="224" font-size="9.5" fill="#555">30,000</text>
  <text x="630" y="224" font-size="9.5" fill="#555">0.010</text>
  <text x="730" y="224" font-size="9.5" fill="#555">60,000</text>

  <!-- scrnaseq_2s -->
  <text x="70" y="246" font-size="9.5" fill="#333" font-family="Courier">scrnaseq_2s_10xv3</text>
  <text x="230" y="246" font-size="9.5" fill="#555">scRNA-seq</text>
  <text x="370" y="246" font-size="9.5" fill="#555">2</text>
  <text x="440" y="246" font-size="9.5" fill="#555">150 bp</text>
  <text x="530" y="246" font-size="9.5" fill="#555">25,000</text>
  <text x="630" y="246" font-size="9.5" fill="#555">0.010</text>
  <text x="730" y="246" font-size="9.5" fill="#555">50,000</text>

  <!-- 16s_6s -->
  <rect x="52" y="253" width="796" height="22" fill="#f5f5f5"/>
  <text x="70" y="268" font-size="9.5" fill="#333" font-family="Courier">16s_6s_pe250</text>
  <text x="230" y="268" font-size="9.5" fill="#555">16S amplicon</text>
  <text x="370" y="268" font-size="9.5" fill="#555">6</text>
  <text x="440" y="268" font-size="9.5" fill="#555">250 bp</text>
  <text x="530" y="268" font-size="9.5" fill="#555">8,000</text>
  <text x="630" y="268" font-size="9.5" fill="#555">0.020</text>
  <text x="730" y="268" font-size="9.5" fill="#555">48,000</text>

  <!-- Summary row -->
  <rect x="52" y="278" width="796" height="22" fill="#e8f5e9"/>
  <text x="70" y="293" font-size="9.5" fill="#2e7d32" font-weight="bold">Total</text>
  <text x="230" y="293" font-size="9.5" fill="#2e7d32" font-weight="bold">9 scenarios</text>
  <text x="360" y="293" font-size="9.5" fill="#2e7d32" font-weight="bold">34 samples</text>
  <text x="720" y="293" font-size="9.5" fill="#2e7d32" font-weight="bold">468,000</text>
  <text x="810" y="293" font-size="9.5" fill="#2e7d32">total reads</text>

  <!-- Diagram of simulation flow -->
  <text x="50" y="345" font-size="12" font-weight="bold" fill="#37474f">Synthetic data generation pipeline</text>

  <!-- Flow boxes -->
  <rect x="50" y="360" width="150" height="50" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="75" y="382" font-size="10" font-weight="bold" fill="#1565c0">Scenario config</text>
  <text x="75" y="398" font-size="9" fill="#555">OmicsScenario struct</text>

  <line x1="200" y1="385" x2="230" y2="385" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <rect x="235" y="360" width="150" height="50" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="255" y="382" font-size="10" font-weight="bold" fill="#e65100">Genome simulator</text>
  <text x="255" y="398" font-size="9" fill="#555">Random ref sequence</text>

  <line x1="385" y1="385" x2="415" y2="385" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <rect x="420" y="360" width="150" height="50" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="445" y="382" font-size="10" font-weight="bold" fill="#2e7d32">FASTQ simulator</text>
  <text x="445" y="398" font-size="9" fill="#555">Paired-end reads</text>

  <line x1="570" y1="385" x2="600" y2="385" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <rect x="605" y="360" width="240" height="50" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="625" y="382" font-size="10" font-weight="bold" fill="#7b1fa2">Per-sample FASTQ pairs</text>
  <text x="625" y="398" font-size="9" fill="#555">{sample}_R1.fastq.gz, {sample}_R2.fastq.gz</text>

  <!-- Features of synthetic data -->
  <rect x="50" y="430" width="800" height="75" rx="6" fill="#fafafa" stroke="#bdbdbd" stroke-width="1"/>
  <text x="70" y="452" font-size="11" font-weight="bold" fill="#37474f">Synthetic data features</text>
  <text x="70" y="472" font-size="10" fill="#555">• Deterministic via fixed random seed per scenario (seed 42–50) → fully reproducible</text>
  <text x="70" y="488" font-size="10" fill="#555">• Configurable read length, error rate, and reads per sample per assay type</text>
  <text x="70" y="504" font-size="10" fill="#555">• Generates valid FASTQ format with quality scores derived from error rate</text>

  <defs>
    <marker id="provArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
</svg>
