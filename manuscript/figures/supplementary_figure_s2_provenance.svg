<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Helvetica, Arial, sans-serif">

  <text x="15" y="22" font-size="14" font-weight="bold" fill="#333">Supplementary Figure S2.</text>
  <text x="225" y="22" font-size="13" fill="#555">Command provenance and reproducibility architecture</text>

  <defs>
    <marker id="provArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Timeline of a single command execution -->
  <text x="50" y="55" font-size="12" font-weight="bold" fill="#37474f">Command execution timeline with provenance recording</text>

  <!-- Step 1: User invocation -->
  <rect x="50" y="70" width="180" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="65" y="90" font-size="10" font-weight="bold" fill="#1565c0">User invocation</text>
  <text x="65" y="105" font-size="8.5" fill="#555" font-family="Courier">oxo-call run samtools</text>
  <text x="65" y="117" font-size="8.5" fill="#555" font-family="Courier">"sort input.bam ..."</text>

  <line x1="230" y1="97" x2="260" y2="97" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <!-- Step 2: Doc fetch + hash -->
  <rect x="265" y="70" width="180" height="55" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="280" y="90" font-size="10" font-weight="bold" fill="#e65100">Documentation fetch</text>
  <text x="280" y="105" font-size="8.5" fill="#555">Cache: --help output</text>
  <text x="280" y="117" font-size="8.5" fill="#555">SHA-256 hash → docs_hash</text>

  <line x1="445" y1="97" x2="475" y2="97" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <!-- Step 3: Skill load -->
  <rect x="480" y="70" width="160" height="55" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.2"/>
  <text x="495" y="90" font-size="10" font-weight="bold" fill="#c62828">Skill loading</text>
  <text x="495" y="105" font-size="8.5" fill="#555">Match: "samtools"</text>
  <text x="495" y="117" font-size="8.5" fill="#555">→ skill_name recorded</text>

  <line x1="640" y1="97" x2="670" y2="97" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <!-- Step 4: LLM call -->
  <rect x="675" y="70" width="175" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="690" y="90" font-size="10" font-weight="bold" fill="#2e7d32">LLM generation</text>
  <text x="690" y="105" font-size="8.5" fill="#555">Model: gpt-4o-mini</text>
  <text x="690" y="117" font-size="8.5" fill="#555">→ model recorded</text>

  <!-- Arrow down to execution -->
  <line x1="762" y1="125" x2="762" y2="150" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <!-- Step 5: Execution -->
  <rect x="625" y="155" width="225" height="50" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.2"/>
  <text x="640" y="175" font-size="10" font-weight="bold" fill="#7b1fa2">Command execution</text>
  <text x="640" y="190" font-size="8.5" fill="#555">tool --version → tool_version recorded</text>

  <!-- Arrow down to provenance record -->
  <line x1="737" y1="205" x2="737" y2="230" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <!-- JSONL history entry -->
  <rect x="50" y="235" width="800" height="120" rx="8" fill="#fafafa" stroke="#37474f" stroke-width="1.5"/>
  <text x="70" y="258" font-size="12" font-weight="bold" fill="#37474f">JSONL History Entry (history.jsonl)</text>

  <text x="70" y="282" font-size="9.5" fill="#333" font-family="Courier, monospace">{</text>
  <text x="85" y="296" font-size="9.5" fill="#333" font-family="Courier, monospace">"id": "a1b2c3d4-...",  "tool": "samtools",  "task": "sort input.bam ...",</text>
  <text x="85" y="310" font-size="9.5" fill="#333" font-family="Courier, monospace">"command": "samtools sort -@ 4 -o sorted.bam input.bam",  "exit_code": 0,</text>
  <text x="85" y="324" font-size="9.5" fill="#1565c0" font-family="Courier, monospace">"provenance": {</text>
  <text x="105" y="338" font-size="9.5" fill="#c62828" font-family="Courier, monospace">"tool_version": "samtools 1.19",  "docs_hash": "a3f8c2...",  "skill_name": "samtools",  "model": "gpt-4o-mini"</text>
  <text x="85" y="350" font-size="9.5" fill="#1565c0" font-family="Courier, monospace">}</text>
  <text x="70" y="350" font-size="9.5" fill="#333" font-family="Courier, monospace">}</text>

  <!-- Divider -->
  <line x1="30" y1="375" x2="870" y2="375" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Reproducibility diagram -->
  <text x="50" y="400" font-size="12" font-weight="bold" fill="#37474f">Drift detection via documentation hashing</text>

  <!-- Version A -->
  <rect x="70" y="415" width="180" height="65" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
  <text x="85" y="435" font-size="10" font-weight="bold" fill="#1565c0">samtools 1.19</text>
  <text x="85" y="450" font-size="9" fill="#555">--help output (cached)</text>
  <text x="85" y="465" font-size="9" fill="#555">docs_hash: a3f8c2...</text>

  <!-- Version B -->
  <rect x="350" y="415" width="180" height="65" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="1.2"/>
  <text x="365" y="435" font-size="10" font-weight="bold" fill="#e65100">samtools 1.20</text>
  <text x="365" y="450" font-size="9" fill="#555">--help output (updated)</text>
  <text x="365" y="465" font-size="9" fill="#555">docs_hash: b7d1e9...</text>

  <!-- Comparison arrow -->
  <line x1="250" y1="447" x2="350" y2="447" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>
  <text x="275" y="438" font-size="9" fill="#c62828" font-weight="bold">≠</text>

  <!-- Alert box -->
  <rect x="580" y="415" width="260" height="65" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="595" y="435" font-size="10" font-weight="bold" fill="#f57f17">⚠ Drift detected</text>
  <text x="595" y="452" font-size="9" fill="#555">Hash mismatch signals tool update.</text>
  <text x="595" y="466" font-size="9" fill="#555">Previous commands may need re-evaluation.</text>

  <line x1="530" y1="447" x2="580" y2="447" stroke="#555" stroke-width="1.2" marker-end="url(#provArr)"/>

  <!-- Bottom: Security features -->
  <rect x="50" y="500" width="800" height="80" rx="6" fill="#fafafa" stroke="#bdbdbd" stroke-width="1"/>
  <text x="70" y="522" font-size="11" font-weight="bold" fill="#37474f">Security and privacy safeguards</text>
  <text x="70" y="542" font-size="10" fill="#555">• HTTPS enforced for all remote LLM API endpoints (HTTP only for localhost/Ollama)</text>
  <text x="70" y="558" font-size="10" fill="#555">• Tool name validation: alphanumeric, hyphen, underscore, dot only (path-traversal prevention)</text>
  <text x="70" y="574" font-size="10" fill="#555">• Optional path &amp; token redaction in LLM prompts (sanitize.rs: redact_paths, redact_env_tokens)</text>
</svg>
