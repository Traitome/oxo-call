<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="skillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8833A;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#E8833A;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50B86C;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#50B86C;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="execGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Panel label -->
  <text x="12" y="22" font-size="16" font-weight="bold" fill="#000">a</text>

  <!-- Title -->
  <text x="450" y="22" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">oxo-call four-stage pipeline</text>

  <!-- Stage 1: Documentation Resolution -->
  <rect x="30" y="40" width="195" height="180" rx="8" fill="url(#docGrad)" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="127" y="60" font-size="11" font-weight="bold" fill="#4A90D9" text-anchor="middle">① Documentation Resolution</text>

  <rect x="45" y="72" width="165" height="22" rx="4" fill="#fff" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="127" y="87" font-size="9" fill="#333" text-anchor="middle">Local cache lookup</text>

  <rect x="45" y="100" width="165" height="22" rx="4" fill="#fff" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="127" y="115" font-size="9" fill="#333" text-anchor="middle">Live --help capture</text>

  <rect x="45" y="128" width="165" height="22" rx="4" fill="#fff" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="127" y="143" font-size="9" fill="#333" text-anchor="middle">User-configured docs</text>

  <rect x="45" y="156" width="165" height="22" rx="4" fill="#fff" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="127" y="171" font-size="9" fill="#333" text-anchor="middle">Remote sources</text>

  <text x="127" y="200" font-size="8" fill="#666" text-anchor="middle" font-style="italic">Complete help text + SHA-256 hash</text>

  <!-- Arrow 1→2 -->
  <line x1="225" y1="130" x2="255" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Stage 2: Skill Loading -->
  <rect x="255" y="40" width="195" height="180" rx="8" fill="url(#skillGrad)" stroke="#E8833A" stroke-width="1.5"/>
  <text x="352" y="60" font-size="11" font-weight="bold" fill="#E8833A" text-anchor="middle">② Skill Loading</text>

  <rect x="270" y="72" width="165" height="22" rx="4" fill="#fff" stroke="#E8833A" stroke-width="0.8"/>
  <text x="352" y="87" font-size="9" fill="#333" text-anchor="middle">User skills (highest priority)</text>

  <rect x="270" y="100" width="165" height="22" rx="4" fill="#fff" stroke="#E8833A" stroke-width="0.8"/>
  <text x="352" y="115" font-size="9" fill="#333" text-anchor="middle">Community skills</text>

  <rect x="270" y="128" width="165" height="22" rx="4" fill="#fff" stroke="#E8833A" stroke-width="0.8"/>
  <text x="352" y="143" font-size="9" fill="#333" text-anchor="middle">MCP server skills</text>

  <rect x="270" y="156" width="165" height="22" rx="4" fill="#fff" stroke="#E8833A" stroke-width="0.8"/>
  <text x="352" y="171" font-size="9" fill="#333" text-anchor="middle">Built-in skills (159 tools)</text>

  <text x="352" y="200" font-size="8" fill="#666" text-anchor="middle" font-style="italic">Concepts + Pitfalls + Examples</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="130" x2="480" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Stage 3: LLM Generation -->
  <rect x="480" y="40" width="195" height="180" rx="8" fill="url(#llmGrad)" stroke="#50B86C" stroke-width="1.5"/>
  <text x="577" y="60" font-size="11" font-weight="bold" fill="#50B86C" text-anchor="middle">③ LLM Command Generation</text>

  <rect x="495" y="72" width="165" height="22" rx="4" fill="#fff" stroke="#50B86C" stroke-width="0.8"/>
  <text x="577" y="87" font-size="9" fill="#333" text-anchor="middle">System prompt (11 rules)</text>

  <rect x="495" y="100" width="165" height="22" rx="4" fill="#fff" stroke="#50B86C" stroke-width="0.8"/>
  <text x="577" y="115" font-size="9" fill="#333" text-anchor="middle">Skill + Docs → Context</text>

  <rect x="495" y="128" width="165" height="22" rx="4" fill="#fff" stroke="#50B86C" stroke-width="0.8"/>
  <text x="577" y="143" font-size="9" fill="#333" text-anchor="middle">ARGS: / EXPLANATION: contract</text>

  <rect x="495" y="156" width="165" height="22" rx="4" fill="#fff" stroke="#50B86C" stroke-width="0.8"/>
  <text x="577" y="171" font-size="9" fill="#333" text-anchor="middle">Retry on malformed response</text>

  <text x="577" y="200" font-size="8" fill="#666" text-anchor="middle" font-style="italic">Providers: Copilot / OpenAI / Anthropic / Ollama</text>

  <!-- Arrow 3→4 -->
  <line x1="675" y1="130" x2="705" y2="130" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Stage 4: Execution -->
  <rect x="705" y="40" width="180" height="180" rx="8" fill="url(#execGrad)" stroke="#9B59B6" stroke-width="1.5"/>
  <text x="795" y="60" font-size="11" font-weight="bold" fill="#9B59B6" text-anchor="middle">④ Execution &amp; Verification</text>

  <rect x="718" y="72" width="155" height="22" rx="4" fill="#fff" stroke="#9B59B6" stroke-width="0.8"/>
  <text x="795" y="87" font-size="9" fill="#333" text-anchor="middle">Command execution</text>

  <rect x="718" y="100" width="155" height="22" rx="4" fill="#fff" stroke="#9B59B6" stroke-width="0.8"/>
  <text x="795" y="115" font-size="9" fill="#333" text-anchor="middle">--verify: LLM QC analysis</text>

  <rect x="718" y="128" width="155" height="22" rx="4" fill="#fff" stroke="#9B59B6" stroke-width="0.8"/>
  <text x="795" y="143" font-size="9" fill="#333" text-anchor="middle">Exit code + stderr parsing</text>

  <rect x="718" y="156" width="155" height="22" rx="4" fill="#fff" stroke="#9B59B6" stroke-width="0.8"/>
  <text x="795" y="171" font-size="9" fill="#333" text-anchor="middle">JSONL history + provenance</text>

  <text x="795" y="200" font-size="8" fill="#666" text-anchor="middle" font-style="italic">UUID, timestamp, docs hash, model</text>

  <!-- Natural language input -->
  <rect x="30" y="245" width="855" height="38" rx="6" fill="#F5F5F5" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="40" y="262" font-size="9" fill="#666">User input:</text>
  <text x="105" y="262" font-size="10" fill="#333" font-style="italic">"align paired-end reads to the human genome with 8 threads using BWA-MEM"</text>
  <text x="40" y="276" font-size="9" fill="#666">Output:</text>
  <text x="105" y="276" font-size="10" fill="#2C3E50" font-family="Courier New, monospace">ARGS: mem -t 8 /path/to/hg38.fa reads_R1.fq.gz reads_R2.fq.gz -o aligned.sam</text>

  <!-- Arrow from input to pipeline -->
  <line x1="457" y1="245" x2="457" y2="225" stroke="#999" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>

  <!-- Provenance box (bottom) -->
  <text x="12" y="310" font-size="16" font-weight="bold" fill="#000">b</text>
  <text x="450" y="310" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Provenance metadata per execution</text>

  <rect x="30" y="320" width="855" height="55" rx="6" fill="#FAFAFA" stroke="#CCC" stroke-width="1"/>

  <!-- Provenance fields -->
  <rect x="45" y="330" width="120" height="32" rx="4" fill="#E8F4FD" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="105" y="343" font-size="8" font-weight="bold" fill="#4A90D9" text-anchor="middle">tool_version</text>
  <text x="105" y="355" font-size="7.5" fill="#666" text-anchor="middle">bwa 0.7.18</text>

  <rect x="178" y="330" width="120" height="32" rx="4" fill="#E8F4FD" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="238" y="343" font-size="8" font-weight="bold" fill="#4A90D9" text-anchor="middle">docs_hash</text>
  <text x="238" y="355" font-size="7.5" fill="#666" text-anchor="middle">sha256:a3f8c1...</text>

  <rect x="311" y="330" width="120" height="32" rx="4" fill="#FDF2E9" stroke="#E8833A" stroke-width="0.8"/>
  <text x="371" y="343" font-size="8" font-weight="bold" fill="#E8833A" text-anchor="middle">skill_name</text>
  <text x="371" y="355" font-size="7.5" fill="#666" text-anchor="middle">bwa (built-in)</text>

  <rect x="444" y="330" width="120" height="32" rx="4" fill="#EAFAF1" stroke="#50B86C" stroke-width="0.8"/>
  <text x="504" y="343" font-size="8" font-weight="bold" fill="#50B86C" text-anchor="middle">model</text>
  <text x="504" y="355" font-size="7.5" fill="#666" text-anchor="middle">gpt-4o</text>

  <rect x="577" y="330" width="120" height="32" rx="4" fill="#F5EEF8" stroke="#9B59B6" stroke-width="0.8"/>
  <text x="637" y="343" font-size="8" font-weight="bold" fill="#9B59B6" text-anchor="middle">exit_code</text>
  <text x="637" y="355" font-size="7.5" fill="#666" text-anchor="middle">0 (success)</text>

  <rect x="710" y="330" width="160" height="32" rx="4" fill="#F5EEF8" stroke="#9B59B6" stroke-width="0.8"/>
  <text x="790" y="343" font-size="8" font-weight="bold" fill="#9B59B6" text-anchor="middle">timestamp + UUID</text>
  <text x="790" y="355" font-size="7.5" fill="#666" text-anchor="middle">2025-01-15T10:32:01Z / f7a2...</text>

  <!-- Skill category distribution (panel d) -->
  <text x="12" y="402" font-size="16" font-weight="bold" fill="#000">c</text>
  <text x="450" y="402" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Built-in skill coverage: 159 tools across 44 analytical categories</text>

  <!-- Bar chart for top categories -->
  <!-- variant-calling: 16 -->
  <rect x="170" y="415" width="256" height="14" rx="2" fill="#4A90D9"/>
  <text x="165" y="426" font-size="8.5" fill="#333" text-anchor="end">variant-calling</text>
  <text x="430" y="426" font-size="8" fill="#fff">16</text>

  <!-- qc: 12 -->
  <rect x="170" y="433" width="192" height="14" rx="2" fill="#E8833A"/>
  <text x="165" y="444" font-size="8.5" fill="#333" text-anchor="end">quality control</text>
  <text x="366" y="444" font-size="8" fill="#fff">12</text>

  <!-- assembly: 11 -->
  <rect x="170" y="451" width="176" height="14" rx="2" fill="#50B86C"/>
  <text x="165" y="462" font-size="8.5" fill="#333" text-anchor="end">assembly</text>
  <text x="350" y="462" font-size="8" fill="#fff">11</text>

  <!-- metagenomics: 10 -->
  <rect x="170" y="469" width="160" height="14" rx="2" fill="#9B59B6"/>
  <text x="165" y="480" font-size="8.5" fill="#333" text-anchor="end">metagenomics</text>
  <text x="334" y="480" font-size="8" fill="#fff">10</text>

  <!-- alignment: 9 -->
  <rect x="170" y="487" width="144" height="14" rx="2" fill="#E74C3C"/>
  <text x="165" y="498" font-size="8.5" fill="#333" text-anchor="end">alignment</text>
  <text x="318" y="498" font-size="8" fill="#fff">9</text>

  <!-- rna-seq: 8 -->
  <rect x="580" y="415" width="128" height="14" rx="2" fill="#3498DB"/>
  <text x="575" y="426" font-size="8.5" fill="#333" text-anchor="end">RNA-seq</text>
  <text x="712" y="426" font-size="8" fill="#333">8</text>

  <!-- epigenomics: 8 -->
  <rect x="580" y="433" width="128" height="14" rx="2" fill="#F39C12"/>
  <text x="575" y="444" font-size="8.5" fill="#333" text-anchor="end">epigenomics</text>
  <text x="712" y="444" font-size="8" fill="#333">8</text>

  <!-- utilities: 6 -->
  <rect x="580" y="451" width="96" height="14" rx="2" fill="#1ABC9C"/>
  <text x="575" y="462" font-size="8.5" fill="#333" text-anchor="end">utilities</text>
  <text x="680" y="462" font-size="8" fill="#333">6</text>

  <!-- hpc: 6 -->
  <rect x="580" y="469" width="96" height="14" rx="2" fill="#8E44AD"/>
  <text x="575" y="480" font-size="8.5" fill="#333" text-anchor="end">HPC</text>
  <text x="680" y="480" font-size="8" fill="#333">6</text>

  <!-- annotation: 6 -->
  <rect x="580" y="487" width="96" height="14" rx="2" fill="#E67E22"/>
  <text x="575" y="498" font-size="8.5" fill="#333" text-anchor="end">annotation</text>
  <text x="680" y="498" font-size="8" fill="#333">6</text>

  <!-- Others label -->
  <text x="750" y="498" font-size="8.5" fill="#666" font-style="italic">+ 34 more categories (52 tools)</text>
</svg>
