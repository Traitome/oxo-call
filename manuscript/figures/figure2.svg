  <text x="343" y="310" text-anchor="middle" class="tick-label">GPT-4o</text>
  <text x="405" y="310" text-anchor="middle" class="tick-label">Claude 3.5</text>
  <text x="467" y="310" text-anchor="middle" class="tick-label">GPT-4o-mini</text>

  <!-- Panel A Legend -->
  <rect x="80" y="335" width="10" height="10" rx="1" fill="#BDBDBD"/>
  <text x="94" y="344" class="legend-text">Baseline (no grounding)</text>
  <rect x="210" y="335" width="10" height="10" rx="1" fill="#2166AC"/>
  <text x="224" y="344" class="legend-text">GPT-4o</text>
  <rect x="275" y="335" width="10" height="10" rx="1" fill="#D6604D"/>
