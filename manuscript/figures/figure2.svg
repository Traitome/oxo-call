<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .panel-bg { fill: #F7F7F7; stroke: #E0E0E0; stroke-width: 1; }
      .panel-label { font-size: 16px; font-weight: bold; fill: #333; }
      .panel-title { font-size: 10px; fill: #555; }
      .axis-label { font-size: 9px; fill: #444; }
      .tick-label { font-size: 8px; fill: #666; }
      .value-label { font-size: 7.5px; fill: #333; font-weight: 600; }
      .value-label-sm { font-size: 7px; fill: #333; font-weight: 600; }
      .gridline { stroke: #E8E8E8; stroke-width: 0.5; stroke-dasharray: 3,3; }
      .axis-line { stroke: #999; stroke-width: 0.75; }
      .legend-text { font-size: 8px; fill: #555; }
      .annotation { font-size: 8.5px; fill: #666; font-style: italic; }
      .annotation-bold { font-size: 9px; fill: #444; font-weight: bold; }
    </style>
  </defs>

  <!-- ==================== PANEL A: Enhanced-mode performance ==================== -->
  <rect x="5" y="5" width="530" height="370" rx="4" class="panel-bg"/>
  <text x="15" y="22" class="panel-label">a</text>
  <text x="35" y="22" class="panel-title">Enhanced-mode performance (n = 47,700 per model)</text>

  <!-- Panel A: Left sub-chart - Exact-match rate (%) -->
  <text x="155" y="48" text-anchor="middle" class="axis-label" font-weight="600">Exact-match rate (%)</text>

  <!-- Left sub-chart axes area: x=40..270, y=55..300 -->
  <!-- Y-axis gridlines and labels -->
  <line x1="60" y1="295" x2="265" y2="295" class="gridline"/><!-- 0% -->
  <line x1="60" y1="234" x2="265" y2="234" class="gridline"/><!-- 25% -->
  <line x1="60" y1="173" x2="265" y2="173" class="gridline"/><!-- 50% -->
  <line x1="60" y1="112" x2="265" y2="112" class="gridline"/><!-- 75% -->
  <line x1="60" y1="51" x2="265" y2="51" class="gridline"/><!-- 100% -->

  <text x="55" y="298" text-anchor="end" class="tick-label">0</text>
  <text x="55" y="237" text-anchor="end" class="tick-label">25</text>
  <text x="55" y="176" text-anchor="end" class="tick-label">50</text>
  <text x="55" y="115" text-anchor="end" class="tick-label">75</text>
  <text x="55" y="54" text-anchor="end" class="tick-label">100</text>

  <!-- Y-axis line -->
  <line x1="60" y1="51" x2="60" y2="295" class="axis-line"/>
  <!-- X-axis line -->
  <line x1="60" y1="295" x2="265" y2="295" class="axis-line"/>

  <!-- GPT-4o bars (baseline=74.09%, enhanced=99.67%) -->
  <!-- baseline: h = 74.09/100 * 244 = 180.8 => y = 295 - 180.8 = 114.2 -->
  <rect x="70" y="114.2" width="22" height="180.8" rx="2" fill="#BDBDBD"/>
  <text x="81" y="110" text-anchor="middle" class="value-label">74.1%</text>
  <!-- enhanced: h = 99.67/100 * 244 = 243.2 => y = 295 - 243.2 = 51.8 -->
  <rect x="94" y="51.8" width="22" height="243.2" rx="2" fill="#2166AC"/>
  <text x="105" y="48" text-anchor="middle" class="value-label">99.7%</text>

  <!-- Claude 3.5 bars (baseline=65.24%, enhanced=99.62%) -->
  <!-- baseline: h = 65.24/100 * 244 = 159.2 => y = 295 - 159.2 = 135.8 -->
  <rect x="132" y="135.8" width="22" height="159.2" rx="2" fill="#BDBDBD"/>
  <text x="143" y="131.5" text-anchor="middle" class="value-label">65.2%</text>
  <!-- enhanced: h = 99.62/100 * 244 = 243.1 => y = 295 - 243.1 = 51.9 -->
  <rect x="156" y="51.9" width="22" height="243.1" rx="2" fill="#D6604D"/>
  <text x="167" y="48" text-anchor="middle" class="value-label">99.6%</text>

  <!-- GPT-4o-mini bars (baseline=52.38%, enhanced=99.51%) -->
  <!-- baseline: h = 52.38/100 * 244 = 127.8 => y = 295 - 127.8 = 167.2 -->
  <rect x="194" y="167.2" width="22" height="127.8" rx="2" fill="#BDBDBD"/>
  <text x="205" y="163" text-anchor="middle" class="value-label">52.4%</text>
  <!-- enhanced: h = 99.51/100 * 244 = 242.8 => y = 295 - 242.8 = 52.2 -->
  <rect x="218" y="52.2" width="22" height="242.8" rx="2" fill="#4DAF4A"/>
  <text x="229" y="48" text-anchor="middle" class="value-label">99.5%</text>

  <!-- Left sub-chart x-axis labels -->
  <text x="93" y="310" text-anchor="middle" class="tick-label">GPT-4o</text>
  <text x="155" y="310" text-anchor="middle" class="tick-label">Claude 3.5</text>
  <text x="217" y="310" text-anchor="middle" class="tick-label">GPT-4o-mini</text>

  <!-- Panel A: Right sub-chart - Accuracy score (%) -->
  <text x="405" y="48" text-anchor="middle" class="axis-label" font-weight="600">Accuracy score (%)</text>

  <!-- Right sub-chart axes area: x=300..515, y=55..300 -->
  <!-- Y-axis gridlines and labels -->
  <line x1="310" y1="295" x2="510" y2="295" class="gridline"/>
  <line x1="310" y1="234" x2="510" y2="234" class="gridline"/>
  <line x1="310" y1="173" x2="510" y2="173" class="gridline"/>
  <line x1="310" y1="112" x2="510" y2="112" class="gridline"/>
  <line x1="310" y1="51" x2="510" y2="51" class="gridline"/>

  <!-- Scale: 95-100% to show differences better -->
  <text x="305" y="298" text-anchor="end" class="tick-label">95</text>
  <text x="305" y="237" text-anchor="end" class="tick-label">96.25</text>
  <text x="305" y="176" text-anchor="end" class="tick-label">97.5</text>
  <text x="305" y="115" text-anchor="end" class="tick-label">98.75</text>
  <text x="305" y="54" text-anchor="end" class="tick-label">100</text>

  <line x1="310" y1="51" x2="310" y2="295" class="axis-line"/>
  <line x1="310" y1="295" x2="510" y2="295" class="axis-line"/>

  <!-- GPT-4o accuracy (baseline=98.12%, enhanced=99.98%) -->
  <!-- Scale: 95-100 range = 5 units over 244px => 1 unit = 48.8px -->
  <!-- baseline: (98.12-95)/5 * 244 = 152.3 => y = 295 - 152.3 = 142.7 -->
  <rect x="320" y="142.7" width="22" height="152.3" rx="2" fill="#BDBDBD"/>
  <text x="331" y="138.5" text-anchor="middle" class="value-label">98.1%</text>
  <!-- enhanced: (99.98-95)/5 * 244 = 243.2 => y = 295 - 243.2 = 51.8 -->
  <rect x="344" y="51.8" width="22" height="243.2" rx="2" fill="#2166AC"/>
  <text x="355" y="48" text-anchor="middle" class="value-label">100.0%</text>

  <!-- Claude 3.5 accuracy (baseline=97.45%, enhanced=99.97%) -->
  <!-- baseline: (97.45-95)/5 * 244 = 119.6 => y = 295 - 119.6 = 175.4 -->
  <rect x="382" y="175.4" width="22" height="119.6" rx="2" fill="#BDBDBD"/>
  <text x="393" y="171" text-anchor="middle" class="value-label">97.5%</text>
