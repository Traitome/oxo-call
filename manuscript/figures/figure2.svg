  <text x="671" y="62" font-size="7.5" fill="#666" text-anchor="middle">97.5%</text>
  <text x="706" y="59" font-size="7.5" fill="#E8833A" text-anchor="middle" font-weight="bold">100.0%</text>
  <text x="771" y="63" font-size="7.5" fill="#666" text-anchor="middle">96.6%</text>
  <text x="806" y="59" font-size="7.5" fill="#50B86C" text-anchor="middle" font-weight="bold">100.0%</text>

