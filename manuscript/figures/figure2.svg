  <!-- baseline: (96.52-95)/5 * 244 = 74.2 => y = 295 - 74.2 = 220.8 -->
  <rect x="444" y="220.8" width="22" height="74.2" rx="2" fill="#BDBDBD"/>
  <text x="455" y="216.5" text-anchor="middle" class="value-label">96.5%</text>
