# git-cliff configuration — https://git-cliff.org
# Generates CHANGELOG.md from conventional commit messages.
#
# Usage:
#   git-cliff --output CHANGELOG.md       # full history
#   git-cliff --unreleased --bump         # preview next version
#   git-cliff v0.3.0..HEAD               # commits since last tag
#
# Install:  cargo install git-cliff

[changelog]
header = """
# Changelog

All notable changes to oxo-call are documented in this file.

The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/)
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

Changelog entries from v0.1.1 onward are automatically generated by
[git-cliff](https://git-cliff.org) from conventional commit messages.
<!-- next-header -->\n
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
  {% if commit.remote.username %} ([@{{ commit.remote.username }}](https://github.com/{{ commit.remote.username }}))\
  {% endif %}\
  {% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/pull/{{ commit.remote.pr_number }}))\
  {% endif %}\
{% endfor %}
{% endfor %}\n
"""

footer = """
<!-- next-url -->
{% set repo_url = "https://github.com/Traitome/oxo-call" %}\
{% for release in releases %}\
    {% if release.version %}\
        {% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: {{ repo_url }}/compare/{{ release.previous.version }}...{{ release.version }}
        {% else %}\
[{{ release.version | trim_start_matches(pat="v") }}]: {{ repo_url }}/releases/tag/{{ release.version }}
        {% endif %}\
    {% else %}\
[Unreleased]: {{ repo_url }}/compare/{{ release.previous.version }}...HEAD
    {% endif %}\
{% endfor %}
"""

trim = true

[git]
# Parse Conventional Commits (https://www.conventionalcommits.org)
conventional_commits = true
filter_unconventional = false
split_commits = false

# Convert PR numbers like (#24) to Markdown links
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Styling" },
  { message = "^ci", group = "CI/CD" },
  { message = "^chore", group = "Maintenance" },
  { message = "^test", group = "Testing" },
  { message = "^build", group = "Build" },
  # Catch-all for non-conventional messages — group by "Other Changes"
  { message = ".*", group = "Other Changes" },
]

# Filter out commits that only bump the version
commit_preprocessors = [
  # Strip commit body and trailers (everything after the subject line) to keep
  # the changelog concise. Squash-merge commits often embed multi-line PR bodies.
  { pattern = "(?s)\\n.*", replace = "" },
  { pattern = " \\(#(\\d+)\\)$", replace = " ([#${1}](https://github.com/Traitome/oxo-call/pull/${1}))" },
]

filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"

[remote.github]
owner = "Traitome"
repo = "oxo-call"
